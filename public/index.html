<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Politiska Alternativ</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        width: min(680px, 92vw);
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 36px rgba(15, 23, 42, 0.15);
        padding: 2rem;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      p {
        line-height: 1.6;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Välkommen till Politiska Alternativ</h1>
      <p>
        Det här är en enkel startsida för test av plattformen. Här kan vi senare visa
        senaste idéer, debatter och AI-stöd för att utforska nya politiska alternativ.
      </p>
    </main>
  </body>
</html>
